<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Hexavante - Login</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    
    <div id="login-container">
      
      <img src="logo.jpg" alt="Logo Hexavante" id="logo-pantera">
      
      <h1>Bem-vindo de volta!</h1>
      <p>Entrar na sua conta</p>

      <form>
        <div class="input-group">
          <input type="email" id="email" placeholder="Email" required>
        </div>

        <div class="input-group">
          <input type="password" id="senha" placeholder="Senha" required>
        </div>

        <div class="opcoes-extras">
          <a href="#" id="esqueceu-senha">Esqueceu sua senha?</a>
        </div>

        <button type="submit">Log In</button>
      </form>

      <div class="divisor">
        <span>Ou continue com</span>
      </div>

      <div class="botoes-sociais">
        <button type="button" class="btn-social">Google</button>
        <button type="button" class="btn-social">Apple</button>
      </div>

      <p class="criar-conta">Ainda não tem uma conta? <a href="#">Inscrever-se</a></p>

    </div>

    <script type="module" src="script.ts"></script>
    
  </body>
</html>
